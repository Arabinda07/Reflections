<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ─────────────────────────────────────────────── -->
    <title>Reflections – Mindful AI Journal</title>
    <meta name="description" content="Reflections is a private, AI-powered mindful journal. Track your mood, write freely, and find calm. Built for India — works offline." />
    <meta name="keywords" content="journal, mindfulness, mental health India, mood tracker, safe space, diary app, AI journal, wellness app" />
    <meta name="author" content="Reflections by Profit Studio" />
    <meta name="robots" content="index, follow" />

    <!-- ── PWA: Manifest ───────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#58CC02" />

    <!-- ── PWA: Apple / iOS ────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reflections" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Favicons ────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- ── Open Graph (Social Sharing) ────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reflections-ebon.vercel.app/" />
    <meta property="og:title" content="Reflections – Mindful AI Journal" />
    <meta property="og:description" content="Your private sanctuary to reflect, feel, and grow. AI-powered journaling with mood tracking." />
    <meta property="og:image" content="https://reflections-ebon.vercel.app/icons/icon-512.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reflections – Mindful AI Journal" />
    <meta name="twitter:description" content="Your private sanctuary to reflect, feel, and grow." />
    <meta name="twitter:image" content="https://reflections-ebon.vercel.app/icons/icon-512.png" />

    <!-- ── Performance: Font Preconnect ───────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Stylesheets ─────────────────────────────────────────────── -->
    <link rel="stylesheet" href="/index.css" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- ── Inline critical styles ──────────────────────────────────── -->
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--bg-color);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: var(--gray-text);
      }
      /* Quill Editor Overrides */
      .ql-container.ql-snow {
        border: none !important;
        font-family: 'Nunito', sans-serif !important;
      }
      .ql-editor {
        font-size: 16px !important;
        color: var(--gray-text) !important;
      }
    </style>

    <!-- ── Schema Markup: SoftwareApplication ─────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Reflections – Mindful Notes",
      "url": "https://reflections-ebon.vercel.app/",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web, Android, iOS",
      "inLanguage": ["en", "hi", "bn", "ta"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "author": {
        "@type": "Organization",
        "name": "Profit Studio"
      },
      "description": "A private, AI-powered mindful journal. Track your mood, write freely, and find calm. Works offline.",
      "screenshot": "https://reflections-ebon.vercel.app/icons/icon-512.png"
    }
    </script>

    <!-- ── ESM Import Map (dev/CDN fallback) ───────────────────────── -->
    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
      }
    }
    </script>

    <!-- ── Service Worker Registration ────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (reg) {
              console.log('[SW] Registered, scope:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
