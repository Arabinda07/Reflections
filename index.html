<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://vitejs.dev/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindful Notes - AI Journaling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/index.css">
    
    <!-- Quill.js for Rich Text Editing -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <!-- Spline Viewer Web Component -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Nunito', 'DIN Round Pro', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
              display: ['Feather Bold', 'Nunito', 'sans-serif'],
            },
            colors: {
              green: {
                DEFAULT: 'var(--green)',
                hover: 'var(--green-hover)',
                shadow: 'var(--green-shadow)',
              },
              blue: {
                DEFAULT: 'var(--blue)',
              },
              'dark-blue': {
                DEFAULT: 'var(--dark-blue)',
              },
              gray: {
                text: 'var(--gray-text)',
                light: 'var(--gray-light)',
                nav: 'var(--nav-text)',
              },
              border: 'var(--border-color)',
              red: 'var(--red)',
              orange: 'var(--orange)',
              golden: 'var(--golden)',
              white: 'var(--panel-bg)',
              black: 'var(--gray-text)',
            },
            backgroundColor: {
              white: 'var(--panel-bg)',
              body: 'var(--bg-color)',
            },
            boxShadow: {
              '3d-green': '0 4px 0 0 var(--green-shadow)',
              '3d-gray': '0 4px 0 0 var(--border-color)',
              '3d-blue': '0 4px 0 0 var(--blue-shadow)',
              '3d-red': '0 4px 0 0 var(--red-shadow)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--bg-color);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: var(--gray-text);
      }
      
      /* Quill Editor Overrides */
      .ql-container.ql-snow {
        border: none !important;
        font-family: 'Nunito', sans-serif !important;
      }
      .ql-editor {
        font-size: 16px !important;
        color: var(--gray-text) !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
