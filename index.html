<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ─────────────────────────────────────────────── -->
    <title>Reflections – Private Journal for Calm Writing</title>
    <meta name="description" content="Reflections is a private journal for thoughtful writing, mood tracking, and calm reflection. Secure, offline-first, and designed to keep your notes yours." />
    <meta name="keywords" content="private journal, reflective writing app, digital diary, mood journal, emotional wellbeing, calm writing, secure notes, daily reflection" />
    <meta name="author" content="Reflections" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://reflections-ebon.vercel.app/" />
    <meta name="google-site-verification" content="fveZCgknZzwBAwwK1uwqRI0HGyM6Qb35SYhO-SP9BxU" />

    <!-- ── PWA: Manifest & Theme ───────────────────────────────────── -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Reflections">

    <!-- ── PWA: Apple / iOS ────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reflections" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Favicons ────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- ── Open Graph (Social Sharing) ────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reflections-ebon.vercel.app/" />
    <meta property="og:site_name" content="Reflections" />
    <meta property="og:title" content="Reflections – Private Journal for Calm Writing" />
    <meta property="og:description" content="Your private space to write, track your mood, and return to your reflections with care." />
    <meta property="og:image" content="https://reflections-ebon.vercel.app/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Reflections – Private Journal for Calm Writing" />
    <meta name="twitter:description" content="Your private space to write, track your mood, and return to your reflections with care." />
    <meta name="twitter:image" content="https://reflections-ebon.vercel.app/icons/icon-512.png" />

    <!-- ── Resource Hints ──────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans+Devanagari:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://esm.sh" />
    <link rel="dns-prefetch" href="https://esm.sh" />
    <link rel="dns-prefetch" href="https://supabase.co" />

    <!-- ── Stylesheets ─────────────────────────────────────────────── -->
    <link rel="stylesheet" href="/index.css" />
    <!-- Quill is now loaded via npm dependency in Editor.tsx -->

    <!-- ── Inline critical styles ──────────────────────────────────── -->
    <style>
      body {
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Noto Sans Devanagari', 'Noto Sans Bengali', sans-serif;
        background-color: var(--bg-color);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: var(--gray-text);
      }
      /* Quill Editor — adds Hindi & Bengali support to the writing surface */
      .ql-container.ql-snow {
        border: none !important;
        font-family: 'Spectral', 'Noto Sans Devanagari', 'Noto Sans Bengali', serif !important;
      }
      .ql-editor {
        font-family: 'Spectral', 'Noto Sans Devanagari', 'Noto Sans Bengali', serif !important;
        font-size: 18px !important;
        color: var(--gray-text) !important;
        line-height: 1.7 !important;
      }
    </style>

    <!-- ── Structured Data (JSON-LD) ──────────────────────────────── -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Reflections",
        "url": "https://reflections-ebon.vercel.app/",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web, Android, iOS",
        "inLanguage": ["en", "hi", "bn", "ta"],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "INR"
        },
        "description": "A private journal for thoughtful writing, mood tracking, and calm reflection. Works offline.",
        "screenshot": "https://reflections-ebon.vercel.app/icons/icon-512.png",
        "featureList": "Private journaling, Mood tracking, Optional reflections, Offline support, Privacy-focused"
      },
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Reflections",
        "url": "https://reflections-ebon.vercel.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://reflections-ebon.vercel.app/#/notes?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Reflections",
        "url": "https://reflections-ebon.vercel.app/",
        "logo": "https://reflections-ebon.vercel.app/icons/icon-512.png"
      }
    ]
    </script>

    <!-- ── ESM Import Map (dev/CDN fallback) ───────────────────────── -->
    <script type="importmap">
    {
      "imports": {
        "@phosphor-icons/react": "https://esm.sh/@phosphor-icons/react@2.0.15",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
      }
    }
    </script>

    <!-- ── Service Worker Registration ────────────────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function (reg) {
              console.log('[SW] Registered, scope:', reg.scope);
            })
            .catch(function (err) {
              console.warn('[SW] Registration failed:', err);
            });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
